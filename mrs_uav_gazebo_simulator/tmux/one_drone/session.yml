# do not modify these
root: ./
name: simulation
socket_name: mrs
attach: false
tmux_options: -f /etc/ctu-mrs/tmux.conf
# you can modify these
pre_window:
  - export UAV_NAME=uav1
  - export RUN_TYPE=simulation
  - export UAV_TYPE=f450
  - export PLATFORM_CONFIG=/home/lmnr31/ros2_ws/src/mrs_uav_gazebo_simulator/config/mrs_uav_system/f450.yaml
  - export RMW_IMPLEMENTATION=rmw_zenoh_cpp
  - export USE_SIM_TIME="true"
  - export GZ_SIM_MODEL_PATH=$GZ_SIM_MODEL_PATH:$HOME/ros2_ws/src/arena_2025_desenho:/home/lmnr31/ros2_ws/src/mrs_uav_gazebo_simulator/models/mrs_robot_description/sdf/drones
  - export GZ_SIM_RESOURCE_PATH=$GZ_SIM_RESOURCE_PATH:$HOME/drone_ws/src/arena_2025_desenho
  - export DRONE_CONFIG=$(readlink -f ../../../my_drone_controller/config/drone_config.yaml)
  - mkdir -p /tmp/drone_logs
  - touch /tmp/drone_commands.log

startup_window: status
windows:
  # ── 1. Zenoh router (ROS 2 middleware) ─────────────────────────────────────
  - zenoh_router:
      layout: tiled
      panes:
        - ros2 run rmw_zenoh_cpp rmw_zenohd

  # ── 2. Gazebo simulator + drone spawn ──────────────────────────────────────
  - gazebo:
      layout: tiled
      panes:
        # world_file:=/home/lmnr31/ros2_ws/src/arena_2025_desenho/my_arena.world
        - ros2 launch mrs_uav_gazebo_simulator simulation.launch.py  gz_headless:=false gz_verbose:=true
        - |
          waitForGazebo; sleep 5
          ros2 service call /mrs_drone_spawner/spawn mrs_msgs/srv/String \
            "{value: '1 --$UAV_TYPE --enable-rangefinder --enable-realsense-down --enable-realsense-front --pos -0.85 0.70 1 1.57'}"

  # ── 3. PX4 API ─────────────────────────────────────────────────────────────
  - px4_api:
      layout: tiled
      panes:
        - ros2 launch mrs_uav_px4_api api.launch.py
        
       
  # ── 4. Status monitor (professional) ───────────────────────────────────────
  - status:
      layout: tiled
      panes:
        - |
          waitForPX4; sleep 3
          source ~/ros2_ws/install/setup.bash
          python3 ./custom_status/drone_status_monitor.py

  # ── 5. RViz visualisation ──────────────────────────────────────────────────
  # - rviz:
  #     layout: tiled
  #     panes:
  #       - ros2 run rviz2 rviz2 -d ./rviz.rviz --ros-args -p use_sim_time:=true

  # ── 6. Drone controller ────────────────────────────────────────────────────
  - drone_controller:
      layout: tiled
      panes:
        - |
          waitForGazebo; sleep 5
          waitForPX4; sleep 2
          source ~/ros2_ws/install/setup.bash
          ros2 run my_drone_controller drone_node --ros-args --params-file $DRONE_CONFIG 2>&1 | tee -a /tmp/drone_logs/drone_controller_$(date +%Y%m%d_%H%M%S).log

 

  # ── 8. Debug console ───────────────────────────────────────────────────────
  - debug_console:
      layout: tiled
      panes:
        - |
          
          source ~/ros2_ws/install/setup.bash
          bash

  # ── 9-10. Free terminals ───────────────────────────────────────────────────
  - terminal1:
  - terminal2:
